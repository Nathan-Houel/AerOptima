<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg2)" rx="16"/>
  <text x="600" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Model Performance — Mean Absolute Error (lower is better)</text>

  <line x1="100" y1="330" x2="600" y2="330" stroke="#334155" stroke-width="1"/>

  <!-- Linear Regression column -->
  <g>
    <text x="190" y="90" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="600">Linear Regression</text>
    <text x="190" y="108" text-anchor="middle" fill="#64748b" font-size="12">Baseline</text>
    <rect x="120" y="100" width="140" height="230" rx="10" fill="#475569"/>
    <text x="190" y="205" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="700">18.04</text>
    <text x="190" y="227" text-anchor="middle" fill="#cbd5e1" font-size="12">min MAE</text>
  </g>

  <line x1="280" y1="230" x2="340" y2="230" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow2)"/>

  <!-- XGBoost column -->
  <g>
    <text x="480" y="90" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="600">XGBoost</text>
    <text x="480" y="108" text-anchor="middle" fill="#64748b" font-size="12">Advanced (honest model)</text>
    <rect x="410" y="111.7" width="140" height="218.3" rx="10" fill="#1d4ed8"/>
    <text x="480" y="215" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">17.12</text>
    <text x="480" y="237" text-anchor="middle" fill="#bfdbfe" font-size="12">min MAE</text>
  </g>

  <line x1="570" y1="230" x2="630" y2="230" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow2)"/>

  <!-- Improvement column -->
  <g>
    <text x="820" y="90" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="600">Improvement</text>
    <text x="820" y="108" text-anchor="middle" fill="#64748b" font-size="12">vs. baseline</text>
    <circle cx="820" cy="220" r="95" fill="none" stroke="#f97316" stroke-width="10"/>
    <text x="820" y="212" text-anchor="middle" fill="#fb923c" font-size="34" font-weight="800">−5.1%</text>
    <text x="820" y="240" text-anchor="middle" fill="#fed7aa" font-size="12">error reduction</text>
  </g>

  <text x="600" y="390" text-anchor="middle" fill="#64748b" font-size="12">Both models trained on leakage-free, pre-takeoff features only</text>
</svg>
